version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Wait 3 days before opening a bump PR so freshly published versions get
    # a chance to be flagged for supply-chain issues before they land.
    cooldown:
      default-days: 3
    groups:
      dependencies:
        patterns:
          - "*"
    # Kiota runtime is pinned to the generator version. Bumps can desync from
    # the pinned Kiota CLI and break generated code, so they are upgraded
    # deliberately at release time, never by dependabot.
    ignore:
      - dependency-name: "Microsoft.Kiota.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
